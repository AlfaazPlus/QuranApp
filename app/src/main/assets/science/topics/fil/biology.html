<div class="toc"> <ul> <li><a href="#water">Tubig: Ang Pinagmulan ng Buhay</a></li> </ul> </div> <div class="reference" id="water"> <p>Binanggit ng Qur'an na ang bawat buhay na bagay ay ginawa mula sa tubig. Kinukumpirma ng modernong biyolohiya na ang cytoplasm, ang pangunahing substansiya ng selula, ay binubuo ng hanggang 80% na tubig.</p> <div class="footer">Al-Anbiya' 21:30</div> </div>
