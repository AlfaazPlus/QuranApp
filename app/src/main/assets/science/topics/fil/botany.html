<div class="toc"> <ul> <li><a href="#pairs">Ang Pagkakaroon ng Kasarian sa mga Halaman</a></li> </ul> </div> <div class="reference" id="pairs"> <p>Dati ay hindi alam na ang mga halaman ay may pagkakaiba sa kasarian (lalaki at babae). Gayunpaman, binanggit ng Qur'an na ang mga halaman ay nilikha nang may magkapares.</p> <div class="footer">Ta-Ha 20:53</div> </div>
