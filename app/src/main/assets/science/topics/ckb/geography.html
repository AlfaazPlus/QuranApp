<h1>جوگرافیا (Geography)</h1> <h3>ڕۆڵی چیاکان لە جێگیرکردنی زەویدا</h3> <div class="reference">{{REF_AR=78:6-7}}<p class="translation">{{REF_TR=78:6-7}}<div class="footer"><span>{{REF_NAME=78:6-7}}</span><a href="https://quranapp.verse.reader/78:6-7">لە خوێنەردا بیکەرەوە</a></div></div> <p>قورئان چیاکان وەک «مێخ» وەسف دەکات کە زەوی جێگیر دەکەن. ئەمە لەگەڵ تیۆرییە زانستییە نوێیەکان لەسەر ڕەگی چیاکان لە ناو توێکڵی زەویدا دەگونجێت.</p>
