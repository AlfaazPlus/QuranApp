<h1>پزیشکی (Medicine)</h1> <h3>سوودەکانی هەنگوین بۆ چارەسەری</h3> <div class="reference">{{REF_AR=16:69}}<p class="translation">{{REF_TR=16:69}}<div class="footer"><span>{{REF_NAME=16:69}}</span><a href="https://quranapp.verse.reader/16:69">لە خوێنەردا بیکەرەوە</a></div></div> <p>قورئان باسی هەنگوین دەکات وەک شیفا بۆ خەڵکی. ئەمڕۆ تایبەتمەندییە دژە بەکتریاکانی هەنگوین لە زانستی پزیشکیدا سەلمێنراوە.</p>
