<h1>موضوعات عمومی (General Science)</h1> <h3>اثر انگشت</h3> <div class="reference">{{REF_AR=75:3-4}}<p class="translation">{{REF_TR=75:3-4}}<div class="footer"><span>{{REF_NAME=75:3-4}}</span><a href="https://quranapp.verse.reader/75/3-4">در متن‌خوان باز کنید</a></div></div> <p>اشاره قرآن به توانایی خداوند در بازسازی نوک انگشتان، در زمانی که کسی از منحصر‌به‌فرد بودن اثر انگشت آگاه نبود، بسیار تأمل‌برانگیز است.</p>
