<h1>گیاه‌شناسی (Botany)</h1> <h3>زوجیت در گیاهان</h3> <div class="reference">{{REF_AR=20:53}}<p class="translation">{{REF_TR=20:53}}<div class="footer"><span>{{REF_NAME=20:53}}</span><a href="https://quranapp.verse.reader/20/53">در متن‌خوان باز کنید</a></div></div> <p>پیش‌تر تصور نمی‌شد که گیاهان نیز دارای تفاوت‌های جنسیتی (نر و ماده) باشند، اما قرآن کریم صراحتاً به آفرینش گیاهان به صورت جفت اشاره کرده است.</p>
