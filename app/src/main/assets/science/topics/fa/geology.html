<h1>زمین‌شناسی (Geology)</h1> <h3>لایه‌های زمین</h3> <div class="reference">{{REF_AR=65:12}}<p class="translation">{{REF_TR=65:12}}<div class="footer"><span>{{REF_NAME=65:12}}</span><a href="https://quranapp.verse.reader/65/12">در متن‌خوان باز کنید</a></div></div> <p>همان‌گونه که قرآن به هفت آسمان اشاره کرده، امروزه زمین‌شناسان لایه‌های مختلف زمین (پوسته، گوشته، هسته و لایه‌های میانی) را شناسایی کرده‌اند.</p>
