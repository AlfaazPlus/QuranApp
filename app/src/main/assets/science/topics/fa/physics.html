<h1>فیزیک (Physics)</h1> <h3>ذرات ریزتر از اتم</h3> <div class="reference">{{REF_AR=10:61}}<p class="translation">{{REF_TR=10:61}}<div class="footer"><span>{{REF_NAME=10:61}}</span><a href="https://quranapp.verse.reader/10:61">در متن‌خوان باز کنید</a></div></div> <p>در حالی که در گذشته اتم را کوچکترین جزء ماده می‌دانستند، قرآن به وجود ذراتی حتی کوچکتر از وزن یک اتم اشاره کرده است.</p>
