<h1>پزشکی (Medicine)</h1> <h3>خواص درمانی عسل</h3> <div class="reference">{{REF_AR=16:69}}<p class="translation">{{REF_TR=16:69}}<div class="footer"><span>{{REF_NAME=16:69}}</span><a href="https://quranapp.verse.reader/16:69">در متن‌خوان باز کنید</a></div></div> <p>قرآن از عسل به عنوان شفایی برای مردمان یاد کرده است. امروزه خواص آنتی‌باکتریال و ضدعفونی‌کننده عسل در علم پزشکی به اثبات رسیده است.</p>
