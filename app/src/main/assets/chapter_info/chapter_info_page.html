<!DOCTYPE html>
<html class="{{THEME}}">

<head>
    <meta charset="UTF-8">
    {{STYLE}}
    <link type="text/css" href="https://assets-file/chapter_info/chapter_info_page.css" rel="stylesheet">
</head>

<body>
<div class="big-title">
    <img class="revelation-image" src="https://assets-image/revelation-image" alt=""/>
    <div class="chapter-title">
        <div class="chapter-title-icon">{{CHAPTER_ICON}}</div>
        <div class="chapter-title-trans">{{CHAPTER_TITLE}}</div>
        <div class="chapter-no">{{CHAPTER_NO}}</div>
    </div>
</div>
<div class="info-card-container">
    <div class="info-card juz-no">
        <div class="title">{{JUZ_TITLE}}</div>
        <div class="value">{{JUZ_VALUE}}</div>
    </div>
    <div class="info-card verse-count">
        <div class="title">{{VERSES_TITLE}}</div>
        <div class="value">{{VERSES_VALUE}}</div>
    </div>
    <div class="info-card ruku-count">
        <div class="title">{{RUKUS_TITLE}}</div>
        <div class="value">{{RUKUS_VALUE}}</div>
    </div>
</div>
<div class="info-card-container">
    <div class="info-card revelation-order">
        <div class="title">{{REV_ORDER_TITLE}}</div>
        <div class="value">{{REV_ORDER_VALUE}}</div>
    </div>
    <div class="info-card revelation-type">
        <div class="title">{{REV_TYPE_TITLE}}</div>
        <div class="value">{{REV_TYPE_VALUE}}</div>
    </div>
</div>
<hr>
<div class="content" style="direction: {{TEXT_DIRECTION}};">
    {{CONTENT}}
</div>
</body>
<script src="https://assets-file/chapter_info/chapter_info_script.js"></script>

</html>
